name: AccessAI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------
  # Lint + Unit Tests
  # -----------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest-asyncio

      - name: Lint
        run: ruff check backend/

      - name: Run tests
        run: pytest tests/ -v --asyncio-mode=auto
        env:
          OLLAMA_BASE_URL: http://localhost:11434   # mocked in tests

  # -----------------------------------------------
  # Accessibility CI scan (optional — add target URL)
  # -----------------------------------------------
  accessibility-scan:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt && playwright install chromium

      - name: Run accessibility scan
        run: |
          python -c "
          import asyncio
          from backend.scanner.axe_scanner import AccessibilityScanner

          async def main():
              scanner = AccessibilityScanner(headless=True)
              result = await scanner.scan('${{ vars.SCAN_TARGET_URL }}', wcag_level='AA')
              score = result['score']
              total = len(result['violations'])
              critical = result['metrics']['critical']
              print(f'Score: {score}/100, Violations: {total}, Critical: {critical}')
              if critical > 0:
                  print('CRITICAL violations found!')
                  exit(1)

          asyncio.run(main())
          "

  # -----------------------------------------------
  # Docker build + push
  # -----------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile.backend -t accessai-backend:latest .

      - name: Tag image
        run: docker tag accessai-backend:latest accessai-backend:${{ github.sha }}
